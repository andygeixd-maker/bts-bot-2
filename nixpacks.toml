[phases.setup]
nixPkgs = [
  "python311",
  "chromium",
  "glib",
  "nss",
  "nspr",
  "atk",
  "cups",
  "dbus",
  "libdrm",
  "expat",
  "fontconfig",
  "freetype",
  "libxkbcommon",
  "mesa"
]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "playwright install chromium"
]

[start]
cmd = "python bot.py"
